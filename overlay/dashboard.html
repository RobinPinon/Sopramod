<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chaos Dashboard Local</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      padding: 16px;
    }
    .top {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1b1b1b;
      color: #fff;
    }
    button {
      padding: 8px 10px;
      border: 1px solid #2b2b2b;
      border-radius: 6px;
      background: #2c2c2c;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #3a3a3a;
    }
    #events {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }
    #status {
      margin-top: 14px;
      color: #9cd0ff;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h2>Chaos Events - Force local</h2>
  <div class="top">
    <input id="user" value="LOCAL_TESTER" />
    <input id="duration" type="number" value="10" min="1" />
    <button id="refresh">Recharger la liste</button>
  </div>
  <div id="events"></div>
  <div id="status"></div>

  <script>
    const eventsWrap = document.getElementById("events");
    const statusEl = document.getElementById("status");
    const userEl = document.getElementById("user");
    const durationEl = document.getElementById("duration");
    const refreshBtn = document.getElementById("refresh");

    async function fetchWithTimeout(url, ms = 2500) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), ms);
      try {
        return await fetch(url, { signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    async function loadEvents() {
      statusEl.textContent = "Chargement des events...";
      eventsWrap.innerHTML = "";
      try {
        // Source unique: registre central du mod.
        const endpoints = [
          "http://127.0.0.1:3010/events",
          "http://localhost:3010/events"
        ];
        let res = null;
        let lastError = null;
        for (const endpoint of endpoints) {
          try {
            const candidate = await fetchWithTimeout(endpoint, 2500);
            if (candidate.ok) {
              res = candidate;
              break;
            }
            lastError = new Error(`HTTP ${candidate.status} on ${endpoint}`);
          } catch (err) {
            lastError = err;
          }
        }
        if (!res) throw lastError ?? new Error("Endpoint /events du mod indisponible");

        const data = await res.json();
        const events = Array.isArray(data.events) ? data.events : [];

        for (const eventName of events) {
          const btn = document.createElement("button");
          btn.textContent = eventName;
          btn.onclick = () => triggerEvent(eventName);
          eventsWrap.appendChild(btn);
        }

        statusEl.textContent = `${events.length} events chargés.`;
      } catch (err) {
        statusEl.textContent = `Impossible de charger les events du registre central: ${String(err)}. Lance Minecraft avec le mod pour activer http://127.0.0.1:3010/events`;
      }
    }

    function toForcedEventId(eventName) {
      return eventName
        .toLowerCase()
        .replace(/\u2019/g, "'")
        .replace(/[\!\(\)]/g, "")
        .replace(/'/g, "")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    async function triggerEvent(eventName) {
      const by = encodeURIComponent(userEl.value || "killer");
      const duration = encodeURIComponent(durationEl.value || "10");
      const forcedEventId = encodeURIComponent(eventName.includes("_") ? eventName : toForcedEventId(eventName));
      const url = `http://127.0.0.1:3010/force-event?event=${forcedEventId}&by=${by}&duration=${duration}`;

      try {
        const res = await fetch(url);
        const txt = await res.text();
        let payload = {};
        try { payload = JSON.parse(txt); } catch (_) {}
        if (!res.ok || payload.ok === false) {
          const reason = payload.error || `HTTP ${res.status}`;
          throw new Error(`${reason} (${forcedEventId})`);
        }
        statusEl.textContent = `Event forcé: ${eventName} (by ${decodeURIComponent(by)})`;
      } catch (err) {
        statusEl.textContent = `Erreur force-event: ${String(err)} (le mod doit être lancé en jeu)`;
      }
    }

    refreshBtn.addEventListener("click", loadEvents);
    loadEvents();
  </script>
</body>
</html>
