<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chaos POC Overlay</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    #eventBox {
      position: absolute;
      left: 24px;
      bottom: 24px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 280px;
      display: none;
    }
    #title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    #by {
      font-size: 20px;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div id="eventBox">
    <div id="title">🔥 SPAWN CREEPER</div>
    <div id="by">👤 TEST_USER</div>
  </div>

  <script>
    const box = document.getElementById("eventBox");
    const title = document.getElementById("title");
    const by = document.getElementById("by");
    let hideTimer = null;

    const ws = new WebSocket("ws://localhost:3000");

    ws.addEventListener("message", (evt) => {
      try {
        const data = JSON.parse(evt.data);
        if (!data.title || !data.triggeredBy) return;

        title.textContent = `🔥 ${data.title}`;
        by.textContent = `👤 ${data.triggeredBy}`;
        box.style.display = "block";

        if (hideTimer) clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
          box.style.display = "none";
        }, 5000);
      } catch (_) {
      }
    });
  </script>
</body>
</html>
